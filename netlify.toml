[build]
  base = "."
  command = "echo \"No build needed\""
  publish = "creator-traffic-tracker"
  functions = "creator-traffic-tracker/netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"